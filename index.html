<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMich Anthropology Faculty Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; color: #111; }
    #app { max-width: 960px; }
    h2 { font-size: 20px; margin: 0 0 16px; }

    /* ── Tab nav ── */
    #tab-nav {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 20px;
      overflow-x: auto;
      gap: 0;
    }
    .tab-btn {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      white-space: nowrap;
      color: #6b7280;
    }
    .tab-btn.active {
      font-weight: 700;
      color: var(--tc);
      border-bottom-color: var(--tc);
    }

    /* ── Summary table ── */
    .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .summary-table thead tr { border-bottom: 2px solid #333; }
    .summary-table th { text-align: left; padding: 8px 12px; }
    .summary-table th.sf-head { text-align: center; font-weight: 600; }
    .summary-table tbody tr { border-bottom: 1px solid #e5e7eb; }
    .summary-table tbody tr:hover { background: #f8fafc; }
    .summary-table td { padding: 10px 12px; }
    .summary-table td.sf-cell { text-align: center; }
    .summary-table tfoot tr { border-top: 2px solid #333; font-weight: 700; }
    .sf-count {
      display: inline-block;
      min-width: 28px;
      height: 28px;
      line-height: 28px;
      border-radius: 6px;
      font-size: 15px;
      text-align: center;
    }

    /* ── Subfield / Courtesy tabs ── */
    .big-num { font-size: 32px; font-weight: 700; }
    .subfield-subtitle { font-size: 14px; color: #666; }
    .rank-section { margin-bottom: 18px; }
    .rank-label {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
    }
    .rank-count { font-size: 13px; color: #999; }
    .name-chips { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 4px; margin-top: 8px; }
    .name-chip {
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }
    .courtesy-card {
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .courtesy-name { font-weight: 600; font-size: 14px; }
    .courtesy-meta { font-size: 13px; color: #666; margin-top: 2px; }
    .sf-tag {
      display: inline-block;
      margin-left: 4px;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Salaries tab ── */
    .salary-note { font-size: 13px; color: #666; margin-bottom: 16px; }
    .salary-wrap { overflow-x: auto; }
    .salary-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
    .salary-table thead tr { border-bottom: 2px solid #333; }
    .salary-table th {
      padding: 8px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      font-weight: 600;
    }
    .salary-table th:hover { color: #000; }
    .salary-table th.right { text-align: right; }
    .salary-table th.center { text-align: center; }
    .salary-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
    .salary-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
    .salary-table td.center { text-align: center; }
    .cost-cell { background: #fffbeb; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .cost-head { background: #fef3c7; text-align: right !important; }
    .not-found { color: #ccc; }
    .frac-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .other-dept {
      display: inline-block;
      margin-right: 4px;
      margin-bottom: 2px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;

      border: 1px solid #e5e7eb;
      color: #555;

    .tag-postdoc  { font-size: 10px; color: #d97706; font-weight: 600; margin-left: 6px; }

    /* ── Distribution tab ── */
    .legend-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; font-size: 12px; align-items: center; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
    .toggle-group { display: flex; border: 1px solid #d1d5db; border-radius: 8px; overflow: hidden; }
    .toggle-btn { padding: 4px 12px; font-size: 12px; border: none; cursor: pointer; background: #fff; color: #555; }
    .toggle-btn.active { background: #374151; color: #fff; font-weight: 700; }
    .hist-wrap { display: flex; align-items: flex-end; gap: 3px; height: 180px; border-bottom: 2px solid #333; }
    .hist-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
    .hist-count { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: #333; min-height: 16px; }
    .hist-bar-stack { width: 100%; display: flex; flex-direction: column-reverse; }
    .hist-seg { width: 100%; border-top: 1px solid rgba(255,255,255,0.3); cursor: default; }
    .hist-labels { display: flex; gap: 3px; margin-top: 4px; }
    .hist-label { flex: 1; text-align: center; font-size: 10px; color: #888; transform: rotate(-30deg); transform-origin: top center; height: 30px; }
    .bar-list { display: flex; flex-direction: column; gap: 3px; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .bar-name { width: 150px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; }
    .bar-track { flex: 1; position: relative; height: 18px; }
    .bar-fill { position: absolute; left: 0; top: 2px; height: 14px; border-radius: 2px; }
    .bar-val { width: 80px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; color: #333; font-weight: 500; }

    /* ── Subfield Costs tab ── */
    .sf-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .sf-card { padding: 16px; border-radius: 10px; }
    .sf-card-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .sf-card-total { font-size: 24px; font-weight: 700; color: #111; }
    .sf-card-label { font-size: 12px; color: #666; margin-top: 4px; }
    .sf-card-detail { margin-top: 10px; font-size: 12px; color: #555; line-height: 1.6; }
    .costs-bars { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .cost-bar-row { display: flex; align-items: center; gap: 10px; }
    .cost-bar-label { width: 120px; text-align: right; font-size: 13px; font-weight: 600; }
    .cost-bar-track { flex: 1; position: relative; height: 28px; }
    .cost-bar-fill { position: absolute; left: 0; top: 0; height: 28px; border-radius: 4px; opacity: 0.75; }
    .cost-bar-text { position: absolute; left: 8px; top: 0; height: 28px; line-height: 28px; font-size: 12px; font-weight: 600; color: #fff; }
    .sf-detail-section { margin-bottom: 24px; }
    .sf-detail-head { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .sf-detail-bar-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 2px; }
    .sf-detail-name { width: 150px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; }
    .sf-detail-track { flex: 1; position: relative; height: 16px; }
    .sf-detail-fill { position: absolute; left: 0; top: 1px; height: 14px; border-radius: 2px; }
    .sf-detail-frac { width: 55px; text-align: center; flex-shrink: 0; font-size: 11px; font-weight: 600; }
    .sf-detail-val { width: 75px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; font-weight: 500; }
    .note-box { margin-top: 20px; padding: 16px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; font-size: 13px; color: #666; }

    @media (max-width: 600px) {
      body { padding: 12px; }
      .bar-name { width: 100px; }
      .sf-detail-name { width: 90px; }
    }
  </style>
</head>

const subfields = ["Sociocultural","Linguistic","Biological","Archaeological"];
const ranks = ["Full Professor","Associate Professor","Assistant Professor","Lecturer IV","Lecturer"];
const sfIdx = { Sociocultural:2, Linguistic:3, Biological:4, Archaeological:5 };

const COLORS = {
  Sociocultural:"#6366f1", Linguistic:"#f59e0b",

  "By Courtesy":"#8b5cf6"

  "Full Professor":"#2563eb",   "Associate Professor":"#7c3aed",
  "Assistant Professor":"#059669","Lecturer IV":"#d97706","Lecturer":"#dc2626"
};
const allTabs = ["Summary",...subfields,"By Courtesy","Salaries","Distribution","Subfield Costs"];
const tabColors = { Summary:"#374151","By Courtesy":COLORS["By Courtesy"],Salaries:"#374151",Distribution:"#374151","Subfield Costs":"#374151" };

// ============================================================
// NAME MATCHING
// ============================================================
const exactOverrides = {
  "Tina Lasisi":"lasisi,",
  "Maureen Devlin":"hamalainen,maureen",
  "Andrew J. Marshall":"marshall, andrew john",
  "Elizabeth F.S. Roberts":"roberts, elizabeth",
  "Webb Keane":"keane jr, edward webb",
  "Mike McGovern":"mcgovern, michael",
  "Luciana Chamorro":"chamorro elizondo,luciana",
  "Julio Villa-Palomino":"villa-palomino,julio",
};
const firstNameAliases = {
  mike:["michael","mike"], michael:["michael","mike"],
  webb:["webb","edward"],  dick:["richard","dick"],
  bill:["william","bill"], bob:["robert","bob"],
};

function getLastNameVariants(facultyName) {
  const clean = facultyName.replace(/\./g,"").toLowerCase();
  const parts = clean.split(/\s+/);
  const last = parts[parts.length-1];
  const variants = new Set([last, facultyName.split(/\s+/).pop().toLowerCase(), last.replace(/'/g,"")]);
  if (last.includes("-")) last.split("-").forEach(p => variants.add(p));
  if (parts.length >= 3) {
    const compound = parts[parts.length-2]+" "+last;
    variants.add(compound);
    const deacc = parts[parts.length-2].normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (deacc !== parts[parts.length-2]) variants.add(deacc+" "+last);
  }
  return [...variants];
}

function firstNameScore(ff, csvFirstFull) {
  const csvParts = csvFirstFull.toLowerCase().split(/\s+/).map(s => s.replace(/[^a-z'-]/g,""));
  const aliases = firstNameAliases[ff.toLowerCase()] || [ff.toLowerCase()];
  for (const a of aliases) for (const c of csvParts) { if (c===a) return 10; }
  for (const a of aliases) for (const c of csvParts) { if (Math.min(a.length,c.length)>=4 && c.substring(0,4)===a.substring(0,4)) return 8; }
  for (const a of aliases) { if (csvFirstFull.toLowerCase().includes(a)) return 6; }
  for (const a of aliases) for (const c of csvParts) { if (Math.min(3,a.length,c.length)>=3 && c.substring(0,3)===a.substring(0,3)) return 5; }
  return 0;
}

function smartMatch(name, rows) {
  const override = exactOverrides[name];
  if (override) {
    const m = rows.filter(r => (r.NAME||"").toLowerCase().includes(override));
    if (m.length) return m;
  }
  const parts = name.replace(/\./g,"").toLowerCase().split(/\s+/);
  const first = parts[0];
  const lastVariants = getLastNameVariants(name);
  const lastMatches = rows.filter(row => {
    const n=(row.NAME||"").toLowerCase(), ci=n.indexOf(",");
    if (ci===-1) return false;
    const csvLast = n.substring(0,ci).trim();
    return lastVariants.some(v => csvLast===v || csvLast.replace(/[^a-z]/g,"")===v.replace(/[^a-z]/g,"") || csvLast.replace(/ jr$/,"").trim()===v);
  });
  if (!lastMatches.length) return [];
  const scored = lastMatches.map(row => {
    const n=(row.NAME||"").toLowerCase();
    return { row, score: firstNameScore(first, n.substring(n.indexOf(",")+1).trim()) };
  });
  const maxScore = Math.max(...scored.map(s=>s.score));
  if (maxScore===0) return [];
  const best = scored.filter(s=>s.score===maxScore).map(s=>s.row);
  const anthroRow = best.find(r=>(r.APPOINTING_DEPT||"").toLowerCase().includes("anthro"));
  if (anthroRow) {
    const exact=(anthroRow.NAME||"").trim().toLowerCase();
    const all=rows.filter(r=>(r.NAME||"").trim().toLowerCase()===exact);
    if (all.length) return all;
  }
  return best;
}

const parseMoney = v => { const n=parseFloat(String(v).replace(/[,$]/g,"")); return isNaN(n)?0:n; };

// ============================================================
// STATE
// ============================================================
let currentTab = "Summary";
let salaryData  = null;
let csvLoading  = true;
let csvError    = null;
let salarySort  = { col:"name", dir:"asc" };
let distMode    = "ftr";

// ============================================================
// HELPERS
// ============================================================
const fmt = v => {
  if (v==null) return "—";
  const n = typeof v==="number" ? v : parseFloat(String(v).replace(/[,$]/g,""));
  return isNaN(n)||n===0 ? "—" : "$"+n.toLocaleString("en-US",{maximumFractionDigits:0});
};
const pct = v => { const n=parseFloat(v); return isNaN(n)?"—":Math.round(n*100)+"%"; };
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ============================================================
// TALLY (Summary)
// ============================================================
function getTally() {
  const r={};
  subfields.forEach(sf=>{r[sf]={};ranks.forEach(rk=>{r[sf][rk]=0;});});
  facultyData.forEach(row=>{
    if(row[6]==="Yes") return;
    subfields.forEach(sf=>{ if(row[sfIdx[sf]]==="Yes") r[sf][row[1]]++; });
  });
  return r;
}

// ============================================================
// TAB RENDERERS
// ============================================================
function renderSummary() {
  const t=getTally();
  let html=`<table class="summary-table"><thead><tr>
    <th>Rank</th>
    ${subfields.map(sf=>`<th class="sf-head" style="color:${COLORS[sf]}">${esc(sf)}</th>`).join("")}
  </tr></thead><tbody>`;
  ranks.forEach(rank=>{
    html+=`<tr><td style="font-weight:500">${esc(rank)}</td>
    ${subfields.map(sf=>{
      const n=t[sf][rank];
      return `<td class="sf-cell"><span class="sf-count" style="background:${n>0?COLORS[sf]+"20":"transparent"};color:${n>0?COLORS[sf]:"#ccc"};font-weight:${n>0?700:400}">${n}</span></td>`;
    }).join("")}</tr>`;
  });
  html+=`</tbody><tfoot><tr><td>Total</td>
    ${subfields.map(sf=>{const tot=ranks.reduce((s,r)=>s+t[sf][r],0);return`<td class="sf-cell" style="color:${COLORS[sf]}">${tot}</td>`;}).join("")}
  </tr></tfoot></table>`;
  return html;
}

function renderSubfield(sf) {
  const color=COLORS[sf];
  const people={};ranks.forEach(r=>{people[r]=[];});
  facultyData.forEach(row=>{if(row[6]==="Yes")return;if(row[sfIdx[sf]]==="Yes")people[row[1]].push(row[0]);});
  const total=ranks.reduce((s,r)=>s+people[r].length,0);
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span class="big-num" style="color:${color}">${total}</span>
    <span class="subfield-subtitle">faculty in ${esc(sf)} Anthropology</span>
  </div>`;
  ranks.forEach(rank=>{
    const names=people[rank];if(!names.length)return;
    html+=`<div class="rank-section">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="rank-label" style="color:${color};background:${color}15">${esc(rank)}</span>
        <span class="rank-count">(${names.length})</span>
      </div>
      <div class="name-chips">${[...names].sort().map(n=>`<span class="name-chip">${esc(n)}</span>`).join("")}</div>
    </div>`;
  });
  return html;
}

function renderCourtesy() {
  const color=COLORS["By Courtesy"];
  const list=facultyData.filter(r=>r[6]==="Yes").map(r=>({
    name:r[0], rank:r[1], sfs:subfields.filter(sf=>r[sfIdx[sf]]==="Yes")
  }));
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span class="big-num" style="color:${color}">${list.length}</span>
    <span class="subfield-subtitle">faculty with courtesy appointments</span>

    html+=`<div class="courtesy-card">
      <div class="courtesy-name">${esc(p.name)}</div>
      <div class="courtesy-meta">${esc(p.rank)}
        ${p.sfs.map(sf=>`<span class="sf-tag" style="color:${COLORS[sf]};background:${COLORS[sf]}15">${esc(sf)}</span>`).join("")}

  return html;
}

function renderSalaries() {
  if(csvLoading) return `<p style="color:#666">Loading salary data…</p>`;
  if(csvError)   return `<p style="color:#ef4444">Error: ${esc(csvError)}</p>`;
  if(!salaryData) return "";
  const arr=col=>col===salarySort.col?(salarySort.dir==="asc"?" ▲":" ▼"):"";
  const rankOrd={};ranks.forEach((r,i)=>{rankOrd[r]=i;});
  const sorted=[...salaryData].sort((a,b)=>{
    let av,bv;
    const c=salarySort.col;
    if(c==="name"){av=a.name;bv=b.name;}
    else if(c==="rank"){av=rankOrd[a.rank]??99;bv=rankOrd[b.rank]??99;}
    else if(c==="salary"){av=a.anthroFtr||0;bv=b.anthroFtr||0;}
    else if(c==="frac"){av=a.anthroFraction||0;bv=b.anthroFraction||0;}
    else if(c==="cost"){av=a.anthroCost||0;bv=b.anthroCost||0;}
    else{av=a.name;bv=b.name;}
    const cmp=av<bv?-1:av>bv?1:0;
    return salarySort.dir==="asc"?cmp:-cmp;
  });
  const matched=salaryData.filter(d=>d.matchCount>0).length;
  let html=`<p class="salary-note">Matched ${matched} of ${salaryData.length} faculty. Click column headers to sort.</p>
  <div class="salary-wrap"><table class="salary-table"><thead><tr>
    <th onclick="setSalarySort('name')">Name${arr("name")}</th>
    <th onclick="setSalarySort('rank')">Rank${arr("rank")}</th>
    <th class="right" onclick="setSalarySort('salary')">Anthro FTR${arr("salary")}</th>
    <th class="center" onclick="setSalarySort('frac')">Anthro Frac${arr("frac")}</th>
    <th class="cost-head" onclick="setSalarySort('cost')">Anthro Cost${arr("cost")}</th>
    <th>Other Appointments</th>
  </tr></thead><tbody>`;
  sorted.forEach(d=>{
    const isP=d.csvTitle&&d.csvTitle.toLowerCase().includes("postdoc");
    const fracPill=d.anthroFraction!=null
      ?`<span class="frac-pill" style="background:${d.anthroFraction>=1?"#10b98120":"#f59e0b20"};color:${d.anthroFraction>=1?"#10b981":"#f59e0b"}">${pct(d.anthroFraction)}</span>`
      :`<span class="not-found">—</span>`;
    const others=d.otherDepts.length
      ?d.otherDepts.map(o=>`<span class="other-dept">${esc(o.dept)} (${pct(o.fraction)}) ${fmt(o.ftr)}</span>`).join("")
      :`<span class="not-found" style="font-size:12px">100% Anthro</span>`;
    html+=`<tr>
      <td style="font-weight:500">${esc(d.name)}${d.courtesy?`<span class="tag-courtesy">(courtesy)</span>`:""}${isP?`<span class="tag-postdoc">(+postdoc)</span>`:""}</td>
      <td style="color:#666">${esc(d.rank)}</td>
      <td class="right">${d.anthroFtr?fmt(d.anthroFtr):`<span class="not-found">not found</span>`}</td>
      <td class="center">${fracPill}</td>
      <td class="cost-cell">${d.anthroCost?fmt(d.anthroCost):`<span class="not-found">—</span>`}</td>
      <td>${others}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function setSalarySort(col) {
  if(salarySort.col===col) salarySort.dir=salarySort.dir==="asc"?"desc":"asc";
  else { salarySort.col=col; salarySort.dir=(col==="salary"||col==="cost")?"desc":"asc"; }
  renderContent();
}

function renderDistribution() {
  if(csvLoading) return `<p style="color:#666">Loading…</p>`;
  if(!salaryData) return "";
  const mode=distMode;
  const withSalary=salaryData.filter(d=>d.anthroFtr&&d.anthroFtr>0&&!d.courtesy)
    .sort((a,b)=>mode==="ftr"?a.anthroFtr-b.anthroFtr:(a.anthroCost||0)-(b.anthroCost||0));
  if(!withSalary.length) return `<p>No salary data found.</p>`;
  const buckets=[0,50000,75000,100000,125000,150000,175000,200000,250000,300000,Infinity];
  const labels=["<$50k","$50-75k","$75-100k","$100-125k","$125-150k","$150-175k","$175-200k","$200-250k","$250-300k","$300k+"];
  const histogram=labels.map(()=>[]);
  withSalary.forEach(d=>{
    const val=mode==="ftr"?d.anthroFtr:(d.anthroCost||0);
    for(let i=0;i<buckets.length-1;i++){if(val>=buckets[i]&&val<buckets[i+1]){histogram[i].push(d);break;}}
  });
  const maxB=Math.max(...histogram.map(h=>h.length),1);
  const segH=Math.max(2,160/maxB);

  let html=`<p style="font-size:13px;color:#666;margin:0 0 8px">${withSalary.length} non-courtesy faculty with salary data. Colored by rank.</p>
  <div class="legend-row">
    ${Object.entries(RANK_COLORS).map(([r,c])=>`<span style="display:flex;align-items:center;gap:4px"><span class="legend-swatch" style="background:${c}"></span>${esc(r)}</span>`).join("")}
    <span style="display:flex;align-items:center;gap:4px"><span class="legend-swatch" style="background:#d97706;background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.5) 2px,rgba(255,255,255,.5) 4px)"></span>Postdoc dual title</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <h3 style="font-size:15px;margin:0">Salary Distribution</h3>
    <div class="toggle-group">
      <button class="toggle-btn${mode==="ftr"?" active":""}" onclick="setDistMode('ftr')">By FTR</button>
      <button class="toggle-btn${mode==="cost"?" active":""}" onclick="setDistMode('cost')">By Anthro Cost</button>
    </div>
  </div>
  <div class="hist-wrap">
    ${histogram.map((bucket)=>{
      const segs=bucket.map(d=>{
        const isP=d.csvTitle&&d.csvTitle.toLowerCase().includes("postdoc");
        const bg=isP?"#d97706":(RANK_COLORS[d.rank]||"#999");
        const bgImg=isP?"repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.3) 3px,rgba(255,255,255,.3) 6px)":"none";
        const val=mode==="ftr"?d.anthroFtr:(d.anthroCost||0);
        return `<div class="hist-seg" title="${esc(d.name)}: ${fmt(val)}" style="height:${segH}px;background:${bg};background-image:${bgImg}"></div>`;
      }).join("");
      return `<div class="hist-col"><div class="hist-count">${bucket.length||""}</div><div class="hist-bar-stack">${segs}</div></div>`;
    }).join("")}
  </div>
  <div class="hist-labels">${labels.map(l=>`<div class="hist-label">${esc(l)}</div>`).join("")}</div>
  <div style="display:flex;align-items:center;gap:12px;margin:24px 0 12px">
    <h3 style="font-size:15px;margin:0">All Faculty, Lowest to Highest</h3>
  </div>
  <div class="bar-list">`;

  const maxVal=Math.max(...withSalary.map(x=>mode==="ftr"?x.anthroFtr:(x.anthroCost||0)),1);
  withSalary.forEach(d=>{
    const val=mode==="ftr"?d.anthroFtr:(d.anthroCost||0);
    const w=Math.max(2,(val/maxVal)*100);
    const isP=d.csvTitle&&d.csvTitle.toLowerCase().includes("postdoc");
    const bg=isP?"#d97706":(RANK_COLORS[d.rank]||"#999");
    const bgImg=isP?"repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.3) 3px,rgba(255,255,255,.3) 6px)":"none";
    const opacity=(mode==="cost"&&d.anthroFraction<1)?0.5:0.85;
    const fracNote=(d.anthroFraction!=null&&d.anthroFraction<1)?`<span style="color:#f59e0b;font-size:10px;margin-left:3px">(${pct(d.anthroFraction)})</span>`:"";
    const starNote=isP?`<span style="color:#d97706;font-size:10px;margin-left:2px">★</span>`:"";
    html+=`<div class="bar-row">
      <div class="bar-name">${esc(d.name)}${fracNote}${starNote}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${bg};background-image:${bgImg};opacity:${opacity}"></div></div>
      <div class="bar-val">${fmt(val)}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function setDistMode(mode) { distMode=mode; renderContent(); }

function renderSubfieldCosts() {
  if(csvLoading) return `<p style="color:#666">Loading…</p>`;
  if(!salaryData) return "";
  const nc=salaryData.filter(d=>!d.courtesy);
  const sfData=subfields.map(sf=>{
    const people=nc.filter(d=>d.subfields.includes(sf));
    const withSal=people.filter(d=>d.anthroCost&&d.anthroCost>0);
    const totalCost=withSal.reduce((s,d)=>s+d.anthroCost,0);
    const totalFte=people.filter(d=>d.anthroFraction!=null).reduce((s,d)=>s+d.anthroFraction,0);
    const fullTime=people.filter(d=>d.anthroFraction!=null&&d.anthroFraction>=1).length;
    const partial=people.filter(d=>d.anthroFraction!=null&&d.anthroFraction<1).length;
    const avgCost=withSal.length>0?totalCost/withSal.length:0;
    return {sf,people,withSal,totalCost,totalFte,fullTime,partial,avgCost,headcount:people.length};
  });
  const maxCost=Math.max(...sfData.map(d=>d.totalCost),1);
  const grandTotal=sfData.reduce((s,d)=>s+d.totalCost,0);

  let html=`<p style="font-size:13px;color:#666;margin:0 0 20px">Cost to dept = FTR × Anthro fraction. Faculty in multiple subfields counted in each. Courtesy excluded.</p>
  <div class="sf-cards">
    ${sfData.map(d=>`<div class="sf-card" style="border:2px solid ${COLORS[d.sf]}40;background:${COLORS[d.sf]}08">
      <div class="sf-card-name" style="color:${COLORS[d.sf]}">${esc(d.sf)}</div>
      <div class="sf-card-total">${fmt(d.totalCost)}</div>
      <div class="sf-card-label">total dept cost</div>
      <div class="sf-card-detail">
        <div>${d.headcount} faculty (${d.fullTime} full, ${d.partial} partial)</div>
        <div>${d.totalFte.toFixed(1)} FTE in Anthro</div>
        <div>Avg cost: ${fmt(d.avgCost)}</div>
      </div>
    </div>`).join("")}
  </div>
  <h3 style="font-size:15px;margin:0 0 12px">Total Department Cost by Subfield</h3>
  <div class="costs-bars">
    ${sfData.map(d=>`<div class="cost-bar-row">
      <div class="cost-bar-label" style="color:${COLORS[d.sf]}">${esc(d.sf)}</div>
      <div class="cost-bar-track">
        <div class="cost-bar-fill" style="width:${d.totalCost/maxCost*100}%;background:${COLORS[d.sf]}"></div>
        <div class="cost-bar-text">${fmt(d.totalCost)}</div>
      </div>
    </div>`).join("")}
  </div>
  <h3 style="font-size:15px;margin:0 0 12px">Faculty Detail by Subfield</h3>`;

  sfData.forEach(d=>{
    const ordered=[...d.withSal].sort((a,b)=>(b.anthroCost||0)-(a.anthroCost||0));
    const maxP=ordered.length?Math.max(...ordered.map(x=>x.anthroCost||0)):1;
    html+=`<div class="sf-detail-section">
      <div class="sf-detail-head" style="color:${COLORS[d.sf]}">${esc(d.sf)} — ${d.headcount} faculty, ${fmt(d.totalCost)} total cost</div>
      <div>
        ${ordered.map(p=>{
          const w=(p.anthroCost||0)/maxP*100;
          const isPartial=p.anthroFraction!=null&&p.anthroFraction<1;
          return `<div class="sf-detail-bar-row">
            <div class="sf-detail-name">${esc(p.name)}</div>
            <div class="sf-detail-track"><div class="sf-detail-fill" style="width:${w}%;background:${COLORS[d.sf]};opacity:${isPartial?0.4:0.7}"></div></div>
            <div class="sf-detail-frac">${isPartial?`<span style="color:#f59e0b">${pct(p.anthroFraction)}</span>`:`<span style="color:#10b981">100%</span>`}</div>
            <div class="sf-detail-val">${fmt(p.anthroCost)}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  });
  html+=`<div class="note-box">Note: Faculty in multiple subfields (e.g., Hull, Keane, Lemon) are counted in each. Grand total across subfields (${fmt(grandTotal)}) double-counts some costs.</div>`;
  return html;
}

// ============================================================
// RENDER ENGINE
// ============================================================
function renderTabs() {
  document.getElementById("tab-nav").innerHTML = allTabs.map(tab=>{
    const color = tabColors[tab] || COLORS[tab] || "#374151";
    return `<button class="tab-btn${tab===currentTab?" active":""}" style="--tc:${color}" onclick="setTab('${tab.replace(/'/g,"\\'")}')">${esc(tab)}</button>`;
  }).join("");
}

function renderContent() {
  const el=document.getElementById("tab-content");
  if(currentTab==="Summary")             el.innerHTML=renderSummary();
  else if(subfields.includes(currentTab)) el.innerHTML=renderSubfield(currentTab);
  else if(currentTab==="By Courtesy")    el.innerHTML=renderCourtesy();
  else if(currentTab==="Salaries")       el.innerHTML=renderSalaries();
  else if(currentTab==="Distribution")   el.innerHTML=renderDistribution();
  else if(currentTab==="Subfield Costs") el.innerHTML=renderSubfieldCosts();
}

function setTab(tab) { currentTab=tab; renderTabs(); renderContent(); }

// ============================================================
// CSV LOADING
// ============================================================
function buildSalaryData(rows) {
  return facultyData.map(f=>{
    const name=f[0],rank=f[1],courtesy=f[6]==="Yes";
    const sfs=subfields.filter(sf=>f[sfIdx[sf]]==="Yes");
    const matches=smartMatch(name,rows);
    const anthroRows=matches.filter(r=>(r.APPOINTING_DEPT||"").toLowerCase().includes("anthro"));
    const otherRows =matches.filter(r=>!(r.APPOINTING_DEPT||"").toLowerCase().includes("anthro"));
    const anthroFtr     =anthroRows.length?parseMoney(anthroRows[0].APPT_ANNUAL_FTR):null;
    const anthroFraction=anthroRows.length?anthroRows[0].APPT_FRACTION:null;
    const anthroCost    =(anthroFtr&&anthroFraction!=null)?anthroFtr*anthroFraction:anthroFtr;
    const csvTitle      =anthroRows.length?(anthroRows[0].APPOINTMENT_TITLE||""):"";
    const otherDepts    =otherRows.map(r=>({dept:(r.APPOINTING_DEPT||"").trim(),fraction:r.APPT_FRACTION,title:(r.APPOINTMENT_TITLE||"").trim(),ftr:parseMoney(r.APPT_ANNUAL_FTR)}));
    return {name,rank,courtesy,subfields:sfs,anthroFtr,anthroFraction,anthroCost,csvTitle,otherDepts,matchCount:matches.length};
  });
}

Papa.parse("salary_record_2025.csv",{
  download:true, header:true, dynamicTyping:true, skipEmptyLines:true,
  complete(results){
    salaryData=buildSalaryData(results.data);
    csvLoading=false;
    renderContent();
  },
  error(err){
    csvError=err.message||"Failed to load CSV";
    csvLoading=false;
    renderContent();
  }
});

// ============================================================
// INIT
// ============================================================
renderTabs();
renderContent();
</script>
